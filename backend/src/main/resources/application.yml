spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update # Auto-adds new columns while preserving existing data
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Security / JWT Keys
app:
  jwt:
    secret: ${JWT_SECRET}
    expirationMs: 86400000 # 24 Hours

server:
  port: 8080
